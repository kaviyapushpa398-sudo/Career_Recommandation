<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Career Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Smart Career Recommendation System</h1>
                <p>Welcome back! Please log in to continue.</p>
            </div>

            <div id="alertBox" class="alert-box hidden"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="login_identifier">Username or Email</label>
                    <input type="text" id="login_identifier" name="login_identifier" placeholder="Enter your username or email">
                    <span class="error-text" id="error_login_identifier"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                    <span class="error-text" id="error_password"></span>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register_page') }}">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/validation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
