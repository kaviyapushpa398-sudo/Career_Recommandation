<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Career Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="topnav">
        <span class="topnav-brand">🎯 Smart Career</span>
        <div class="topnav-links">
            <a href="{{ url_for('dashboard') }}" class="active">Dashboard</a>
            <a href="{{ url_for('profile_page') }}">My Profile</a>
        </div>
        <button id="logoutBtn" class="btn-nav-logout">Log Out</button>
    </nav>

    <div class="page-wrapper">
        <div class="welcome-card">
            <div class="welcome-icon">👋</div>
            <h1>Welcome back, {{ full_name }}!</h1>
            <p>You are logged in to the Smart Career Recommendation System.</p>

            <div class="quick-links">
                <a href="{{ url_for('profile_page') }}" class="quick-link-card">
                    <div class="ql-icon">👤</div>
                    <div class="ql-label">My Profile</div>
                    <div class="ql-sub">Skills, interests, certifications & projects</div>
                </a>
                <div class="quick-link-card disabled">
                    <div class="ql-icon">🤖</div>
                    <div class="ql-label">Career Recommendations</div>
                    <div class="ql-sub">Coming in Phase 3</div>
                </div>
                <div class="quick-link-card disabled">
                    <div class="ql-icon">📊</div>
                    <div class="ql-label">Career Analytics</div>
                    <div class="ql-sub">Coming in Phase 3</div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
